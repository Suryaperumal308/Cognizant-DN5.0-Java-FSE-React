server.port=9090

spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Account Service Route
spring.cloud.gateway.mvc.routes[0].id=account-service
spring.cloud.gateway.mvc.routes[0].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/accounts/**

# Loan Service Route
spring.cloud.gateway.mvc.routes[1].id=loan-service
spring.cloud.gateway.mvc.routes[1].uri=lb://LOAN-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/loans/**